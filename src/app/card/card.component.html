<div class="grid-card flex flex-col justify-center items-center">
  <div [style.background-image]="backgroundStyle()" class="background"></div>
  <h2 class="grid-title text-center">
    @if (!logoLink()) {
      <span>{{title()}}</span>
    }
    @if (logoLink()) {
      <img [src]="logoLink()" alt="" class="project-logo">
    }
  </h2>
  <p class="grid-sub-title text-center">
    {{subTitle()}}
  </p>
</div>
